<!DOCTYPE html><html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actueel Aanbod</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #1a1a1a;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        .container {
            width: 1080px;
            height: 1920px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Bordeaux kader */
        .container::before {
            content: '';
            position: absolute;
            inset: 18px;
            border: 3px solid #7a0030;
            pointer-events: none;
            z-index: 10;
        }

        /* ── HEADER ── */
        .header {
            padding: 44px 60px 18px;
            text-align: center;
            background: #fff;
        }

        .status-label {
            font-size: 100px;
            font-weight: 900;
            color: #7a0030;
            letter-spacing: 8px;
            line-height: 1;
            font-family: Georgia, serif;
            text-transform: uppercase;
        }

        .divider-thick {
            height: 4px;
            background: #7a0030;
            margin: 14px 50px 4px;
        }

        .divider-thin {
            height: 1px;
            background: #7a0030;
            margin: 0 50px 0;
        }

        /* ── ADRES ── */
        .address-bar {
            text-align: center;
            padding: 22px 60px 20px;
            background: #fff;
        }

        .property-title {
            font-size: 42px;
            font-weight: bold;
            color: #1a1a1a;
        }

        .location {
            font-size: 30px;
            color: #666;
            margin-top: 6px;
        }

        /* ── FOTO ── */
        .photo-wrapper {
            margin: 0 40px;
            flex: 1;
            overflow: hidden;
            border: 2px solid #ccc;
        }

        .photo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            transition: opacity 1s ease-in-out;
        }

        /* ── PRIJS + BEDRIJF ── */
        .price-bar {
            display: flex;
            margin: 0 40px;
            min-height: 155px;
        }

        .price-block {
            background: #7a0030;
            color: #fff;
            padding: 24px 36px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .price-label {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 48px;
            font-weight: 900;
        }

        .logo-block {
            background: #fff;
            border: 2px solid #7a0030;
            border-left: none;
            min-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 30px;
        }

        .company-name {
            font-size: 38px;
            font-weight: 900;
            color: #7a0030;
            letter-spacing: 3px;
            text-align: center;
            font-family: Georgia, serif;
        }

        /* ── OMSCHRIJVING ── */
        .description-bar {
            background: #7a0030;
            margin: 0 40px;
            padding: 26px 36px;
            color: #fff;
        }

        .desc-text {
            font-size: 21px;
            line-height: 1.65;
            color: #f0d0d8;
        }

        /* ── FOOTER: weer + tijd ── */
        .footer-bar {
            background: #fff;
            padding: 16px 55px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            color: #888;
        }

        /* ── HYPOTHEEK SLIDE ── */
        .mortgage-slide {
            display: none;
            width: 100%;
            height: 100%;
            background: #ffffff;
            padding: 60px;
            box-sizing: border-box;
        }

        .mortgage-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

    </style>


</head>
<body><div class="container">

    <!-- PROPERTY SLIDE -->
    <div id="property-slide" style="display:flex; flex-direction:column; height:100%;">

        <div class="header">
            <div class="status-label" id="property-status">TE KOOP</div>
        </div>
        <div class="divider-thick"></div>
        <div class="divider-thin"></div>

        <div class="address-bar">
            <div class="property-title" id="property-title"></div>
            <div class="location"       id="property-location"></div>
        </div>

        <div class="photo-wrapper">
            <img id="property-image" src="" alt="Vastgoed afbeelding">
        </div>

        <div class="price-bar">
            <div class="price-block">
                <div class="price-label">Vraagprijs:</div>
                <div class="price-value" id="property-price"></div>
            </div>
            <div class="logo-block">
                <img
                        src="https://www.reliplan.nl/img/logo-Reliplan.png"
                        alt="Reliplan logo">
            </div>
        </div>

        <div class="description-bar">
            <div class="desc-text" id="property-extra"></div>
        </div>

        <div class="footer-bar">
            <div id="weather">Weer laden...</div>
            <div id="datetime"></div>
        </div>

    </div>

    <!-- HYPOTHEEK SLIDE -->
    <div id="mortgage-slide" class="mortgage-slide">
        <img
                src="https://adviesmodules.nl/api/public/images/rentes/ec5054cbc1e3931c31b00a69404fc86efddc8c1a08d5634824e28230240d1502.gif"
                alt="Actuele hypotheekrentes"
                style="width:100%; height:100%; object-fit:contain;">
    </div>


</div><script>
    // ─── CONFIGURATIE ─────────────────────────────────────────────
    const WEATHER_API_KEY = "06322c6a982ff2505e5e14fddfe13da9";
    const WEATHER_CITY    = "Nieuwerkerk aan den IJssel";
    const SHEET_URL       = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRa29HRCuJc1qEQ2oQlNwNssmog5XiBcTyoVIGg3wbpUiOFLc-q77pOuQ3aA3scxiUFmftQMR08AuxP/pub?output=csv";
    const SLIDE_INTERVAL  = 10000;
    // ──────────────────────────────────────────────────────────────

    let currentIndex = 0;
    let properties   = [];

    // Robuuste CSV-parser
    function parseCSV(text) {
        const lines   = text.trim().split('\n');
        const headers = parseLine(lines[0]).map(h => h.trim().toLowerCase());
        return lines.slice(1)
            .filter(l => l.trim() !== "")
            .map(line => {
                const values = parseLine(line);
                const obj    = {};
                headers.forEach((h, i) => obj[h] = (values[i] || "").trim());
                return obj;
            });
    }

    function parseLine(line) {
        const result = [];
        let current  = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const c = line[i];
            if (c === '"') {
                if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
                else inQuotes = !inQuotes;
            } else if (c === ',' && !inQuotes) {
                result.push(current);
                current = "";
            } else {
                current += c;
            }
        }
        result.push(current);
        return result;
    }

    // Accentkleur op basis van status
    function getAccentColor(status) {
        const s = (status || "").toLowerCase();
        if (s.includes("verkocht") || s.includes("verhuurd")) return "#2a7a2a";
        if (s.includes("huur"))  return "#1a4a8a";
        if (s.includes("optie")) return "#b86000";
        return "#7a0030";
    }

    function setAccentColor(color) {
        document.querySelector('.price-block').style.background      = color;
        document.querySelector('.description-bar').style.background  = color;
        document.querySelector('.divider-thick').style.background     = color;
        document.querySelector('.divider-thin').style.background      = color;
        document.querySelector('.status-label').style.color           = color;
        document.querySelector('.logo-block').style.borderColor       = color;

        // Kader kleur dynamisch updaten
        let styleTag = document.getElementById('dynamic-accent');
        if (!styleTag) {
            styleTag    = document.createElement('style');
            styleTag.id = 'dynamic-accent';
            document.head.appendChild(styleTag);
        }
        styleTag.textContent = `.container::before { border-color: ${color} !important; }`;
    }

    function renderSlide(item) {
        const propertySlide = document.getElementById('property-slide');
        const mortgageSlide = document.getElementById('mortgage-slide');
        const imageEl       = document.getElementById('property-image');
        const type          = (item.type || "pand").toLowerCase();

        // HYPOTHEEK SLIDE
        if (type === "hypotheek") {
            propertySlide.style.display = "none";
            mortgageSlide.style.display = "flex";
            return;
        }

        // PROPERTY SLIDE
        mortgageSlide.style.display = "none";
        propertySlide.style.display = "flex";

        const color = getAccentColor(item.status || "");
        setAccentColor(color);

        document.getElementById('property-status').textContent   = (item.status  || "TE KOOP").toUpperCase();
        document.getElementById('property-title').textContent    = item.titel     || "";
        document.getElementById('property-location').textContent = item.plaats    || "";
        document.getElementById('property-price').textContent    = item.prijs     || "";
        document.getElementById('property-extra').textContent    = item.extra     || "";

        // Afbeelding fade
        if (imageEl) imageEl.style.opacity = 0;
        setTimeout(() => {
            if (imageEl && item.afbeelding) {
                imageEl.onload  = () => imageEl.style.opacity = 1;
                imageEl.onerror = () => imageEl.style.opacity = 0;
                if (imageEl.src.endsWith(item.afbeelding)) {
                    imageEl.style.opacity = 1;
                } else {
                    imageEl.src = item.afbeelding;
                }
            }
        }, 800);
    }

    // Laad Google Sheet als CSV
    fetch(SHEET_URL)
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
        .then(csv => {
            const data = parseCSV(csv);
            if (!data.length) { console.error("Sheet leeg."); return; }
            properties = data;
            renderSlide(properties[currentIndex]);
            setInterval(() => {
                currentIndex = (currentIndex + 1) % properties.length;
                renderSlide(properties[currentIndex]);
            }, SLIDE_INTERVAL);
        })
        .catch(e => console.error("Sheet fout:", e));

    // Datum & tijd
    function updateDateTime() {
        const now  = new Date();
        let   date = now.toLocaleDateString('nl-NL', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        });
        date = date.charAt(0).toUpperCase() + date.slice(1);
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('datetime').textContent = `${date} | ${hh}:${mm}:${ss}`;
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Weer
    function updateWeather() {
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(WEATHER_CITY)},NL&units=metric&lang=nl&appid=${WEATHER_API_KEY}`)
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(d => {
                if (d.cod !== 200) {
                    document.getElementById("weather").textContent = "Weer niet beschikbaar";
                    return;
                }
                const temp    = Math.round(d.main.temp);
                const desc    = d.weather[0].description;
                const iconUrl = `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
                document.getElementById("weather").innerHTML =
                    `<img src="${iconUrl}" alt="${desc}" style="vertical-align:middle;width:26px;"> ${WEATHER_CITY} | ${temp}°C | ${desc}`;
            })
            .catch(() => {
                document.getElementById("weather").textContent = "Weer niet beschikbaar";
            });
    }
    updateWeather();
    setInterval(updateWeather, 1800000);


</script></body>
</html>
